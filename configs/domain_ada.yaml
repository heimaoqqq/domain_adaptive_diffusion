# Domain Adaptation specific configuration
# This extends/overrides default.yaml

# Inherit from default
defaults:
  - default

# Model - optimized for domain adaptation
model:
  dim: 64
  dim_mults: [1, 2, 4, 4]
  dropout: 0.1  # Add dropout for better generalization
  attention_resolutions: [8, 4]

# Diffusion - stable settings for few-shot
diffusion:
  objective: "pred_v"  # More stable for few samples
  beta_schedule: "cosine"
  min_snr_loss_weight: true  # Better for few-shot
  min_snr_gamma: 5

# Domain adaptation - tuned parameters
domain_adaptation:
  mmd_loss_weight: 0.1  # 基础权重，通过schedule动态调整
  mmd_kernel_bandwidth: [0.25, 0.5, 1.0, 2.0, 4.0]  # 多尺度核，覆盖不同特征距离
  mmd_kernel_num: 5  # Multiple kernels
  domain_balance_ratio: 0.8  # 80%源域，20%目标域
  use_ema: true
  ema_decay: 0.995
  
  # Additional losses (optional)
  use_coral: false
  coral_weight: 0.05
  use_dann: false
  dann_weight: 0.1

# Training - optimized schedule
training:
  # Phase 1: Longer pretrain for better base
  pretrain:
    epochs: 50  # 预训练50个epoch
    batch_size: 64  # 48G显存可以使用更大的batch
    learning_rate: 2e-4
    warmup_epochs: 5  # warmup 5个epoch
    
  # Phase 2: Careful alignment
  align:
    epochs: 60  # 域对齐60个epoch
    batch_size_source: 48  # 源域批次
    batch_size_target: 16  # 目标域批次（few-shot）
    learning_rate: 5e-5  # 降低学习率，更稳定的对齐
    warmup_epochs: 3
    # Gradually increase MMD weight
    mmd_schedule: "cosine"  # 使用cosine schedule，更平滑的权重变化
    mmd_start_weight: 0.01  # 从更小的权重开始
    mmd_end_weight: 0.15  # 适度的最终权重
    
  # Phase 3: Gentle finetune
  finetune:
    epochs: 30  # 微调30个epoch
    batch_size: 32  # 专注目标域
    learning_rate: 2e-5  # 更小的学习率，防止过拟合
    warmup_epochs: 2
    # No augmentation for micro-Doppler data
    use_augmentation: false
    augmentation_prob: 0.0

  # Optimizer
  optimizer: "adamw"
  weight_decay: 0.01
  beta1: 0.9
  beta2: 0.999
  eps: 1e-8
  
  # Learning rate schedule
  lr_scheduler: "cosine"  # constant | linear | cosine
  lr_min: 1e-6
  
  # Regularization
  gradient_clip: 1.0
  gradient_penalty: 0.0
  
  # Checkpointing
  save_every_epochs: 5  # 每5个epoch保存
  save_best: true
  save_last: false  # 只保留最佳模型
  delete_old_checkpoints: true  # 删除旧的checkpoint
  
  # Sampling during training
  sample_every_epochs: 2  # 每2个epoch生成可视化样本
  num_samples: 31  # 生成31个样本（每个用户一个）
  save_visualization: true  # 保存可视化图像
  
  # Early stopping
  early_stopping: true
  patience: 10
  min_delta: 0.001

# Data augmentation - DISABLED for micro-Doppler
augmentation:
  enabled: false  # 微多普勒时频图不适合数据增强
  # 原因：
  # 1. 时频图的物理意义不允许随意变换
  # 2. 翻转/旋转会破坏多普勒频移信息
  # 3. 混合会产生不真实的频谱

# Generation - classifier-free guidance
generation:
  num_samples: 3100  # 生成100个/用户，便于后续筛选
  batch_size: 31  # 匹配用户数，便于并行生成
  guidance_scale: 2.5  # 适度的引导强度，平衡质量和多样性
  guidance_schedule: "constant"  # constant | linear | cosine
  domain: "target"
  
  # Multi-scale generation
  use_multiscale: false
  scales: [1.0, 1.5, 2.0]
  
  # Filtering
  use_filtering: true
  filter_method: "classifier_confidence"  # classifier_confidence | fid | mmd
  filter_threshold: 0.7
  keep_ratio: 0.5  # Keep top 50%

# Evaluation - comprehensive metrics
evaluation:
  metrics:
    - "fid"
    - "kid"  # Kernel Inception Distance
    - "mmd"
    - "classification_accuracy"
    - "domain_shift"  # Custom metric
    
  # FID settings
  fid_num_samples: 2048
  fid_dims: 2048
  
  # Classification evaluation
  use_lccs: true  # Use LCCS-adapted classifier
  lccs_support_size: 8
  
  # Domain shift measurement
  measure_domain_shift: true
  domain_shift_method: "mmd"  # mmd | coral | proxy_a_distance

# Advanced settings
advanced:
  # Gradient reversal (for DANN-style training)
  use_gradient_reversal: false
  gradient_reversal_lambda: 1.0
  
  # Pseudo-labeling for target domain
  use_pseudo_labeling: false
  pseudo_label_threshold: 0.9
  
  # Self-training
  use_self_training: false
  self_training_iterations: 3
  
  # Ensemble generation
  use_ensemble: false
  ensemble_size: 3
  
  # Progressive training
  progressive_resolution: false
  start_resolution: 8
  target_resolution: 16

# Experiment tracking
experiment:
  name: "domain_ada_microdoppler"
  tags: ["domain_adaptation", "few_shot", "diffusion"]
  notes: "Domain adaptive diffusion for micro-Doppler spectrograms"
  
# Random seed
seed: 42

# Logging settings
logging:
  use_wandb: false  # 默认不使用wandb
  use_tensorboard: true
  log_every: 10
  wandb_project: "domain-adaptive-diffusion"
  wandb_entity: null  # 填入你的wandb用户名（如果需要）

# Debug settings
debug:
  verbose: true
  check_nan: true
  profile: false
  deterministic: true

