# ADM-Small配置 - 适合小数据集（~5k样本）
# 基于OpenAI guided-diffusion的小模型配置

experiment:
  name: "adm_small"
  description: "ADM-Small for micro-Doppler signals with 31 users"
  seed: 42

# 数据配置
data:
  latent_path: "/kaggle/working/data/processed"
  image_size: 256
  latent_size: 32  # VAE latent: 256/8=32
  num_classes: 31

# ADM-Small模型配置
model:
  type: "UNet2DModel"
  in_channels: 4
  out_channels: 4
  
  # 小模型通道配置（适合小数据集）
  block_out_channels: [128, 256, 384, 384]  # ADM-Small配置
  layers_per_block: 2  # 减少层数防止过拟合
  
  # 注意力配置
  attention_head_dim: 8  # 小注意力头
  dropout: 0.1  # 适度dropout
  
  # 条件机制
  num_class_embeds: 32  # 31用户 + 1 null（官方方法）
  
  # 归一化配置
  norm_num_groups: 32
  norm_eps: 1e-6
  act_fn: "silu"
  
  # Scale-shift norm（ADM核心）
  resnet_time_scale_shift: "scale_shift"

# 噪声调度器配置
noise_scheduler:
  num_train_timesteps: 1000
  beta_start: 0.00085
  beta_end: 0.012
  beta_schedule: "linear"  # 小数据集用线性更稳定
  variance_type: "fixed_small"
  clip_sample: true
  clip_sample_range: 1.0

# 训练配置
training:
  pretrain:
    epochs: 100  # 充分训练
    batch_size: 16  # 小batch防止过拟合
    learning_rate: 1e-4  # 标准学习率
    weight_decay: 0.01
    gradient_clip: 1.0
    
    # 学习率调度
    warmup_steps: 500
    lr_scheduler: "constant"  # 小数据集用常数学习率
    
    # 验证配置
    val_every: 5
    save_every: 10

# 优化器配置
optimizer:
  type: "AdamW"
  betas: [0.9, 0.999]
  eps: 1e-8

# EMA配置
ema:
  use_ema: true
  beta: 0.9999
  update_every: 1
  update_after_step: 500

# 推理配置  
inference:
  ddpm_num_steps: 1000
  ddim_num_steps: 50
  ddim_eta: 0.0
  sampling_method: "ddpm"  # 小数据集优先稳定性

# VAE配置
vae_checkpoint: "/kaggle/input/kl-vae-best-pt/kl_vae_best.pt"
vae:
  scale_factor: 0.18215

# 输出配置
output_dir: "/kaggle/working/diffusers_experiments/adm_small"
checkpoint_dir: "/kaggle/working/checkpoints/adm_small"

# 硬件优化
use_amp: true
num_workers: 4

# 注意：不使用数据增强，保持原始数据
