# HuggingFace Diffusers 基础配置
# 第一阶段：只训练源域的条件DDPM

# 实验配置
experiment:
  name: "diffusers_baseline"
  description: "Basic conditional DDPM using HuggingFace Diffusers"
  seed: 42

# 数据配置
data:
  latent_path: "/kaggle/working/data/processed"  # 包含source_train.pt的目录
  image_size: 256  # 原始图像大小
  latent_size: 32  # VAE latent大小 (256/8=32) - 实际训练数据是32x32
  num_classes: 31  # 用户数量

# 模型配置（UNet2DConditionModel）
model:
  type: "UNet2DConditionModel"
  in_channels: 4  # VAE latent channels
  out_channels: 4
  # 模型大小 - 增大模型容量
  block_out_channels: [128, 256, 512, 512]  # 增大通道数
  layers_per_block: 3  # 增加层数
  attention_head_dim: 16  # 增大注意力头维度
  # 条件配置 - 使用更强的条件机制
  num_class_embeds: 31
  class_embed_type: "timestep"  # 使用timestep风格的嵌入，更强大
  class_embeddings_concat: true  # 将类别嵌入连接到所有层
  # 添加cross attention支持
  cross_attention_dim: 128  # 条件嵌入维度
  # 归一化
  norm_num_groups: 32  # 增加归一化组数
  norm_eps: 1e-6
  # 激活函数
  act_fn: "silu"

# 噪声调度器配置
noise_scheduler:
  num_train_timesteps: 1000
  beta_start: 0.0001
  beta_end: 0.02
  beta_schedule: "linear"
  variance_type: "fixed_small"

# 训练配置
training:
  pretrain:
    epochs: 50  # 先训练50个epoch看效果
    batch_size: 32  # 使用32的batch size
    learning_rate: 1e-4  # 标准学习率
    weight_decay: 0.01
    gradient_clip: 1.0
    # 验证配置
    val_every: 5  # 每5个epoch验证一次
    save_every: 5  # 每5个epoch保存一次

# 优化器配置
optimizer:
  type: "AdamW"
  betas: [0.9, 0.999]
  eps: 1e-8

# EMA配置
ema:
  use_ema: true
  beta: 0.9999
  update_every: 1

# 推理配置
inference:
  num_inference_steps: 50  # DDIM步数
  guidance_scale: 1.0  # 暂时不用CFG

# 其他配置
use_amp: true  # 使用混合精度
gradient_clip: 1.0

# VAE配置（用于可视化）
vae_checkpoint: "/kaggle/input/kl-vae-best-pt/kl_vae_best.pt"
vae:
  scale_factor: 0.18215  # KL-VAE的scale factor

# 输出目录
output_dir: "/kaggle/working/diffusers_experiments/baseline"
